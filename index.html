<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioХим — Платформа репетитора</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, 'Segoe UI', 'Nunito', sans-serif;
            background: #f4f9f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: 360px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            text-align: center;
            border: 1px solid #b7e4c7;
        }
        .login-logo {
            font-size: 2.2rem;
            font-weight: bold;
            color: #2d6a4f;
        }
        .login-logo span { color: #52b788; }
        .login-sub {
            font-size: 0.75rem;
            color: #7a9b73;
            margin-bottom: 24px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 16px;
            border-radius: 12px;
            border: 1.5px solid #b7e4c7;
            font-size: 1rem;
            outline: none;
        }
        input:focus { border-color: #40916c; }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #2d6a4f, #40916c);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(45,106,79,0.2); }
        .login-hint {
            font-size: 0.75rem;
            color: #7a9b73;
            margin-top: 20px;
        }
        .login-hint b { color: #40916c; }
        .error {
            color: #c0392b;
            font-size: 0.8rem;
            margin-top: 8px;
        }
        .app { display: none; margin: 20px; text-align: center; }
        .app h2 { color: #2d6a4f; margin-bottom: 20px; }
        button.logout {
            background: #e0e0e0;
            color: #333;
            width: auto;
            padding: 8px 20px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div id="loginScreen" class="login-card">
    <div class="login-logo">Bio<span>Хим</span></div>
    <div class="login-sub">Платформа репетитора</div>
    <input type="text" id="loginUsername" placeholder="Логин" value="admin">
    <input type="password" id="loginPassword" placeholder="Пароль" value="admin123">
    <button id="loginBtn">Войти</button>
    <div id="loginError" class="error"></div>
    <div class="login-hint">
        <b>Администратор:</b> admin / admin123<br>
        <b>Ученик 1:</b> anna / 1234<br>
        <b>Ученик 2:</b> dima / 1234
    </div>
</div>

<div id="app" class="app">
    <h2>Добро пожаловать, <span id="userName"></span>!</h2>
    <p>Вы успешно вошли в систему.</p>
    <button id="logoutBtn" class="logout">Выйти</button>
</div>

<script>
    // ----- Пользователи (пароли в открытом виде, только для демо) -----
    const USERS = [
        { id: 'admin', login: 'admin', password: 'admin123', name: 'Преподаватель', role: 'admin' },
        { id: 'anna',  login: 'anna',  password: '1234',      name: 'Анна Петрова',  role: 'student' },
        { id: 'dima',  login: 'dima',  password: '1234',      name: 'Дмитрий Козлов',role: 'student' }
    ];

    let currentUser = null;

    // Элементы DOM
    const loginScreen = document.getElementById('loginScreen');
    const appDiv = document.getElementById('app');
    const userNameSpan = document.getElementById('userName');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const loginError = document.getElementById('loginError');

    // Функция входа
    function doLogin() {
        const login = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        
        // Поиск пользователя
        const user = USERS.find(u => u.login === login && u.password === password);
        
        if (!user) {
            loginError.textContent = 'Неверный логин или пароль';
            return;
        }
        
        currentUser = user;
        // Сохраняем сессию
        localStorage.setItem('biohim_session', JSON.stringify({
            id: user.id,
            name: user.name,
            role: user.role,
            expires: Date.now() + 12 * 3600 * 1000
        }));
        
        // Показать приложение
        loginScreen.style.display = 'none';
        appDiv.style.display = 'block';
        userNameSpan.textContent = user.name;
        loginError.textContent = '';
    }

    // Выход
    function doLogout() {
        currentUser = null;
        localStorage.removeItem('biohim_session');
        loginScreen.style.display = 'block';
        appDiv.style.display = 'none';
        document.getElementById('loginUsername').value = 'admin';
        document.getElementById('loginPassword').value = 'admin123';
    }

    // Проверка сохранённой сессии при загрузке
    function checkSession() {
        const saved = localStorage.getItem('biohim_session');
        if (saved) {
            try {
                const session = JSON.parse(saved);
                if (session.expires && Date.now() < session.expires) {
                    const user = USERS.find(u => u.id === session.id);
                    if (user) {
                        currentUser = user;
                        loginScreen.style.display = 'none';
                        appDiv.style.display = 'block';
                        userNameSpan.textContent = user.name;
                        return;
                    }
                }
            } catch(e) {}
        }
        // Если сессии нет или она невалидна, показываем логин
        loginScreen.style.display = 'block';
        appDiv.style.display = 'none';
    }

    // Назначить обработчики
    loginBtn.addEventListener('click', doLogin);
    logoutBtn.addEventListener('click', doLogout);
    
    // Также Enter на полях
    document.getElementById('loginUsername').addEventListener('keypress', (e) => { if (e.key === 'Enter') doLogin(); });
    document.getElementById('loginPassword').addEventListener('keypress', (e) => { if (e.key === 'Enter') doLogin(); });
    
    // Старт
    checkSession();
</script>

</body>
</html>
